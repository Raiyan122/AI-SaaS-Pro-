<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Intelligent Agent Command Shell Environment Workstation — NeuroFlow AI Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body class="dark-theme">

    <div class="dashboard-root-wrapper">
        <aside class="sidebar-navigation-panel">
            <a href="../index.html" class="sidebar-logo-zone">
                <div class="brand-core-cube"></div>
                <span>NeuroFlow <span class="text-gradient-flow">Pro</span></span>
            </a>
            <ul class="sidebar-links-list">
                <li><a href="dashboard.html" class="sidebar-nav-item-link"><i class="fa-solid fa-chart-pie"></i> Telemetry Metrics</a></li>
                <li><a href="ai-chat.html" class="sidebar-nav-item-link is-active"><i class="fa-solid fa-wand-magic-sparkles"></i> Cognitive Agent Shell</a></li>
                <li><a href="../index.html" class="sidebar-nav-item-link logout-link-override" style="margin-top: 40px; color: var(--color-danger);"><i class="fa-solid fa-power-off"></i> Disconnect Session</a></li>
            </ul>
        </aside>

        <main class="workstation-container">
            <header class="workstation-top-navbar">
                <h2 style="font-family: var(--font-mono); font-size: 1.25rem;">Cognitive Model Direct-Access Kernel Console Terminal</h2>
            </header>

            <div class="workstation-viewport-scroll-frame">
                <div class="glass-card agent-chat-window-frame">
                    <div class="agent-chat-messages-container" id="chat-stream-live-viewport-node-target">
                        <div class="chat-bubble-row inbound-agent">
                            <strong>System AI Engine Kernel Agent-01 Framework initiated successfully.</strong><br>
                            Awaiting contextual telemetry dataset parsing payload or direct instruction sets...
                        </div>
                    </div>
                    <form id="chat-form-input-interceptor-mesh-management-tray" class="agent-chat-input-toolbar-tray" onsubmit="handleQueryTokenTransmissionSubmission(event)">
                        <input type="text" id="raw-operator-terminal-string-input" required placeholder="Issue prompt instruction sequences or system action directives down to the cluster layer matrix..." class="chat-input-node">
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Pipeline Prompt Stream</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
